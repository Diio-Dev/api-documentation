<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diio API Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4d65ff;
      --primary-light: #eef1ff;
      --primary-dark: #3347e0;
      --dark: #1a1f36;
      --text: #374151;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f5f6fa;
      --white: #ffffff;
      --sw: 264px;
      --green: #059669; --green-bg: #d1fae5;
      --blue: #1e40af; --blue-bg: #dbeafe;
      --amber: #92400e; --amber-bg: #fef3c7;
      --red: #991b1b; --red-bg: #fee2e2;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); color: var(--text); background: var(--bg); }

    /* HEADER */
    .hdr { position: fixed; top: 0; left: 0; right: 0; height: 58px; background: var(--dark); display: flex; align-items: center; padding: 0 20px; z-index: 200; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .hdr-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark { width: 30px; height: 30px; background: var(--primary); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: white; letter-spacing: -1px; flex-shrink: 0; }
    .logo-name { font-size: 17px; font-weight: 700; color: white; letter-spacing: -0.5px; }
    .logo-badge { font-size: 10px; background: rgba(77,101,255,0.25); color: #a5b4fc; padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(77,101,255,0.35); font-weight: 500; }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
    .lang-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: var(--font); letter-spacing: 0.03em; }
    .lang-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* LAYOUT */
    .layout { display: flex; margin-top: 58px; min-height: calc(100vh - 58px); }

    /* SIDEBAR */
    .sidebar { width: var(--sw); position: fixed; top: 58px; bottom: 0; left: 0; overflow-y: auto; background: var(--white); border-right: 1px solid var(--border); padding: 16px 0 32px; }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .sb-group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 16px 18px 5px; }
    .sb-link { display: flex; align-items: center; gap: 8px; padding: 7px 18px; font-size: 13px; color: var(--text); text-decoration: none; border-left: 3px solid transparent; transition: all 0.12s; line-height: 1.4; }
    .sb-link:hover { background: var(--primary-light); color: var(--primary); }
    .sb-link.active { background: var(--primary-light); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
    .sb-method { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }

    /* MAIN */
    .main { margin-left: var(--sw); flex: 1; padding: 40px 48px 80px; max-width: 1100px; }

    /* SECTIONS */
    .sec { margin-bottom: 60px; scroll-margin-top: 78px; }
    .sec-title { font-size: 24px; font-weight: 700; color: var(--dark); margin-bottom: 10px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
    .sec-desc { font-size: 15px; line-height: 1.75; color: var(--text); margin-bottom: 20px; }

    /* INTRO HERO */
    .hero { background: linear-gradient(135deg, var(--dark) 0%, #1e2a5e 100%); border-radius: 14px; padding: 40px 44px; margin-bottom: 48px; color: white; }
    .hero h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; }
    .hero p { font-size: 16px; opacity: 0.75; line-height: 1.6; max-width: 600px; }
    .hero-badges { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
    .hero-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 14px; font-size: 13px; }
    .hero-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

    /* INFO BOXES */
    .info-box { border-left: 4px solid var(--primary); background: var(--primary-light); padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.65; margin-bottom: 20px; }
    .warn-box { border-left: 4px solid #f59e0b; background: #fffbeb; padding: 12px 16px; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.65; margin-bottom: 20px; }

    /* CODE */
    pre { background: #1e2235; border-radius: 10px; padding: 18px 20px; overflow-x: auto; margin-bottom: 16px; }
    pre code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: #e2e8f0; background: none; }
    code.ic { background: var(--primary-light); color: var(--primary); padding: 2px 7px; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12.5px; font-weight: 500; }

    /* ENDPOINT CARDS */
    .ep-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; background: var(--white); }
    .ep-hdr { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none; transition: background 0.1s; }
    .ep-hdr:hover { background: #f8f9ff; }
    .ep-hdr.open { background: #f8f9ff; }
    .meth { font-size: 10.5px; font-weight: 800; padding: 3px 9px; border-radius: 5px; min-width: 50px; text-align: center; letter-spacing: 0.04em; flex-shrink: 0; }
    .m-get { background: var(--green-bg); color: var(--green); }
    .m-post { background: var(--blue-bg); color: var(--blue); }
    .m-put { background: var(--amber-bg); color: var(--amber); }
    .m-delete { background: var(--red-bg); color: var(--red); }
    .ep-path { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13.5px; color: var(--dark); font-weight: 500; }
    .ep-sum { font-size: 13px; color: var(--muted); margin-left: auto; padding-left: 12px; }
    .chevron { color: var(--muted); transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; }
    .ep-hdr.open .chevron { transform: rotate(180deg); }
    .ep-body { display: none; padding: 22px 22px 24px; border-top: 1px solid var(--border); }
    .ep-body.open { display: block; }
    .ep-desc { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 20px; }

    /* PARAMS TABLE */
    .tbl-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
    .params-tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 22px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .params-tbl th { background: var(--bg); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
    .params-tbl td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
    .params-tbl tr:last-child td { border-bottom: none; }
    .p-name { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 600; color: var(--dark); font-size: 12.5px; }
    .p-req { font-size: 10px; color: #dc2626; font-weight: 700; margin-left: 4px; }
    .p-opt { font-size: 10px; color: var(--muted); font-weight: 600; margin-left: 4px; }
    .p-type { font-family: 'SF Mono', 'Fira Code', monospace; color: var(--primary); font-size: 12px; }
    .p-ex { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: var(--muted); }

    /* RESPONSES */
    .resp-row { display: flex; align-items: flex-start; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
    .resp-row:last-child { border-bottom: none; }
    .resp-code { font-family: 'SF Mono', monospace; font-weight: 700; font-size: 13px; min-width: 42px; }
    .s200 { color: var(--green); } .s201 { color: var(--green); } .s400 { color: #d97706; } .s401 { color: #dc2626; } .s402 { color: #dc2626; } .s404 { color: #dc2626; } .s500 { color: #9333ea; }

    /* SUBSECTION */
    .sub-title { font-size: 17px; font-weight: 600; color: var(--dark); margin: 28px 0 10px; }

    /* EVENT CARDS */
    .ev-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; background: var(--white); overflow: hidden; }
    .ev-hdr { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; background: white; transition: background 0.1s; }
    .ev-hdr:hover { background: #f8f9ff; }
    .ev-hdr.open { background: #f8f9ff; }
    .ev-action { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 600; color: var(--primary); }
    .ev-desc { font-size: 13px; color: var(--muted); margin-left: auto; padding-left: 12px; }
    .ev-body { display: none; padding: 20px 22px; border-top: 1px solid var(--border); }
    .ev-body.open { display: block; }
    .ev-desc-full { font-size: 14px; line-height: 1.7; margin-bottom: 16px; }

    /* CREDS LIST */
    .creds-list { list-style: none; padding: 0; margin: 12px 0; }
    .creds-list li { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; font-size: 14px; }
    .creds-list li::before { content: '→'; color: var(--primary); font-weight: 700; flex-shrink: 0; }

    /* BACK TO TOP */
    #btt { position: fixed; bottom: 28px; right: 28px; width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 14px rgba(77,101,255,0.4); transition: transform 0.2s; z-index: 100; }
    #btt:hover { transform: translateY(-2px); }
    #btt.show { display: flex; }

    /* FOOTER */
    .footer { border-top: 1px solid var(--border); margin-top: 60px; padding: 28px 48px; margin-left: var(--sw); background: white; display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); }
    .footer a { color: var(--primary); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 24px 20px 60px; }
      .footer { margin-left: 0; padding: 20px; }
      .hero { padding: 28px 24px; }
      .hero h1 { font-size: 22px; }
    }
  </style>
</head>

// ─── ENDPOINT DATA ─────────────────────────────────────────────────────────────
function getEndpoints(lang) {
  const t = T[lang];
  const stdErrors = [
    { code: '400', cls: 's400', desc: t.r400 },
    { code: '401', cls: 's401', desc: t.r401 },
    { code: '402', cls: 's402', desc: t.r402 },
    { code: '500', cls: 's500', desc: t.r500 },
  ];
  const stdErrors404 = [
    { code: '400', cls: 's400', desc: t.r400 },
    { code: '401', cls: 's401', desc: t.r401 },
    { code: '402', cls: 's402', desc: t.r402 },
    { code: '404', cls: 's404', desc: t.r404 },
    { code: '500', cls: 's500', desc: t.r500 },
  ];
  return {
    auth: [{
      id: 'ep-refresh', method: 'POST', path: '/refresh_token', noAuth: true,
      sum: t.epRefreshSum, desc: t.epRefreshDesc,
      body: [
        { name: 'client_id', type: 'string', req: true, desc: 'Your client ID', ex: 'your-client-id' },
        { name: 'client_secret', type: 'string', req: true, desc: 'Your client secret', ex: 'your-client-secret' },
        { name: 'refresh_token', type: 'string', req: true, desc: 'Your refresh token', ex: 'your-refresh-token' },
      ],
      curl: `curl -X POST https://your-company.diio.com/api/external/refresh_token \\
  -H "Content-Type: application/json" \\
  -d '{
    "client_id": "your-client-id",
    "client_secret": "your-client-secret",
    "refresh_token": "your-refresh-token"
  }'`,
      resExample: `{\n  "access_token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."\n}`,
      responses: [{ code: '200', cls: 's200', desc: t.r200Refresh }, { code: '401', cls: 's401', desc: t.r401 }]
    }],
    exports: [
      {
        id: 'ep-create-export', method: 'POST', path: '/v1/exports',
        sum: t.epCreateExportSum, desc: t.epCreateExportDesc,
        body: [
          { name: 'file_type', type: 'string', req: true, desc: t.pFileType + ' <code class="ic">csv</code> | <code class="ic">json</code>', ex: 'json' },
          { name: 'send_to', type: 'string (email)', req: false, desc: t.pSendTo, ex: 'john@doe.com' },
          { name: 'model', type: 'string', req: false, desc: t.pModel + ' <code class="ic">meeting</code> | <code class="ic">phone_call</code>. Default: <code class="ic">meeting</code>', ex: 'phone_call' },
        ],
        curl: `curl -X POST https://your-company.diio.com/api/external/v1/exports \\
  -H "Authorization: Bearer <access_token>" \\
  -H "Content-Type: application/json" \\
  -d '{"file_type": "json", "send_to": "john@doe.com", "model": "phone_call"}'`,
        resExample: `{\n  "id": "343f605a-0bde-11f0-a454-06254876e271"\n}`,
        responses: [{ code: '200', cls: 's200', desc: t.r200Export }, ...stdErrors]
      },
      {
        id: 'ep-get-export', method: 'GET', path: '/v1/exports/{uuid}',
        sum: t.epGetExportSum, desc: t.epGetExportDesc,
        pathParams: [{ name: 'uuid', type: 'string (uuid)', req: true, desc: t.pExportId, ex: '343f605a-0bde-11f0-a454-06254876e271' }],
        curl: `curl https://your-company.diio.com/api/external/v1/exports/343f605a-0bde-11f0-a454-06254876e271 \\
  -H "Authorization: Bearer <access_token>"`,
        resExample: `{\n  "id": "343f605a-0bde-11f0-a454-06254876e271",\n  "file_url": "https://example.com/343f605a....json",\n  "email": "john@doe.com",\n  "status": "finished",\n  "created_at": "2025-01-01T01:01:01Z"\n}`,
        responses: [{ code: '200', cls: 's200', desc: t.r200ExportGet }, ...stdErrors404]
      }
    ],
    meetings: [
      {
        id: 'ep-list-meetings', method: 'GET', path: '/v1/meetings',
        sum: t.epListMeetingsSum, desc: t.epListMeetingsDesc,
        queryParams: [
          { name: 'page', type: 'integer', req: false, desc: t.pPage, ex: '1' },
          { name: 'limit', type: 'integer', req: false, desc: t.pLimit, ex: '20' },
        ],
        curl: `curl "https://your-company.diio.com/api/external/v1/meetings?page=1&limit=20" \\
  -H "Authorization: Bearer <access_token>"`,
        resExample: `{\n  "meetings": [\n    {\n      "id": "343f605a-0bde-11f0-a454-06254876e271",\n      "name": "Meeting with John",\n      "scheduled_at": "2025-10-01T15:10:05",\n      "created_at": "2025-10-01T15:10:05"\n    }\n  ],\n  "total": 1000,\n  "next": 2\n}`,
        responses: [{ code: '200', cls: 's200', desc: t.r200List }, ...stdErrors]

      {

        sum: t.epGetMeetingSum, desc: t.epGetMeetingDesc,

        curl: `curl "https://your-company.diio.com/api/external/v1/meetings/343f605a-0bde-11f0-a454-06254876e271" \\

        resExample: `{\n  "id": "343f605a-0bde-11f0-a454-06254876e271",\n  "name": "Meeting with John",\n  "scheduled_at": "2025-10-01T15:10:05",\n  "analyzed_status": "finished",\n  "error_cause": null,\n  "attendees": { "sellers": [...], "customers": [...] },\n  "participants": [...]\n}`,
        responses: [{ code: '200', cls: 's200', desc: t.r200Detail }, ...stdErrors404]

          { name: 'duration', type: 'integer', req: true, desc: t.pDuration, ex: '600' },
          { name: 'user_id', type: 'string (uuid)', req: true, desc: t.pUserId, ex: 'c2d83840-fb6d-11ef-b70f-06254876e271' },
          { name: 'call_from_number', type: 'string', req: true, desc: t.pCallFromNumber, ex: '+130512341234' },
          { name: 'customer_name', type: 'string', req: true, desc: t.pCustomerName, ex: 'John Doe' },
          { name: 'customer_email', type: 'string (email)', req: true, desc: t.pCustomerEmail, ex: 'john@doe.com' },
          { name: 'customer_phone', type: 'string', req: true, desc: t.pCustomerPhone, ex: '+130543214321' },
          { name: 'occurred_at', type: 'string (date-time)', req: true, desc: t.pOccurredAt, ex: '2025-10-01T15:10:05' },
        ],
        curl: `curl -X POST https://your-company.diio.com/api/external/v1/phone_calls \\

  -d '{\n    "name": "Call with John",\n    "media_url": "https://example.com/call.mp3",\n    "duration": 600,\n    "user_id": "c2d83840-fb6d-11ef-b70f-06254876e271",\n    "call_from_number": "+130512341234",\n    "customer_name": "John Doe",\n    "customer_email": "john@doe.com",\n    "customer_phone": "+130543214321",\n    "occurred_at": "2025-10-01T15:10:05"\n  }'`,

        responses: [{ code: '200', cls: 's200', desc: t.r200Create }, ...stdErrors]
      },
      {

        resExample: `{\n  "phone_calls": [\n    {\n      "id": "343f605a-0bde-11f0-a454-06254876e271",\n      "name": "Call with John",\n      "occurred_at": "2025-10-01T15:10:05"\n    }\n  ],\n  "total": 1000,\n  "next": 2\n}`,

// ─── RENDER HELPERS ────────────────────────────────────────────────────────────
function paramsTable(params, kind, lang) {
  const t = T[lang];
  if (!params || !params.length) return '';
  const title = kind === 'path' ? t.lPathParams : kind === 'query' ? t.lQueryParams : t.lReqBody;
  let rows = params.map(p => `<tr>
    <td><span class="p-name">${p.name}</span><span class="${p.req ? 'p-req' : 'p-opt'}">${p.req ? t.lRequired : t.lOptional}</span></td>
    <td><span class="p-type">${p.type}</span></td>
    <td>${p.desc}</td>
    <td><span class="p-ex">${p.ex}</span></td>
  </tr>`).join('');
  return `<div class="tbl-title">${title}</div>
  <table class="params-tbl">
    <thead><tr><th>${t.lName}</th><th>${t.lType}</th><th>${t.lDesc}</th><th>${t.lExample}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function responsesSection(responses, lang) {
  const t = T[lang];
  let rows = responses.map(r => `<div class="resp-row">
    <span class="resp-code ${r.cls}">${r.code}</span>
    <span>${r.desc}</span>
  </div>`).join('');
  return `<div class="tbl-title" style="margin-top:20px">${t.lResponses}</div>
  <div style="border:1px solid var(--border);border-radius:8px;padding:6px 14px;margin-bottom:16px">${rows}</div>`;
}

function renderEndpoint(ep, lang) {
  const t = T[lang];
  const mClass = 'm-' + ep.method.toLowerCase();
  return `<div class="ep-card">
    <div class="ep-hdr" onclick="toggleEp(this)" id="${ep.id}-hdr">
      <span class="meth ${mClass}">${ep.method}</span>
      <span class="ep-path">${ep.path}</span>
      <span class="ep-sum">${ep.sum}</span>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="ep-body" id="${ep.id}-body">
      <p class="ep-desc">${ep.desc}</p>
      ${paramsTable(ep.pathParams, 'path', lang)}
      ${paramsTable(ep.queryParams, 'query', lang)}
      ${paramsTable(ep.body, 'body', lang)}
      <div class="tbl-title">${t.lExReq}</div>
      <pre><code>${escHtml(ep.curl)}</code></pre>
      <div class="tbl-title">${t.lExRes}</div>
      <pre><code>${escHtml(ep.resExample)}</code></pre>
      ${responsesSection(ep.responses, lang)}
    </div>
  </div>`;
}

function renderEvent(ev, lang) {
  const t = T[lang];
  let causesHtml = '';
  if (ev.errorCauses) {
    causesHtml = `<div class="tbl-title" style="margin-top:16px">${t.errCausesTitle}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
      ${ev.errorCauses.map(c => `<code class="ic">${c}</code>`).join('')}
    </div>`;
  }
  return `<div class="ev-card">
    <div class="ev-hdr" onclick="toggleEv(this)" id="ev-${ev.action.replace(/\./g,'-')}-hdr">
      <span class="ev-action">${ev.action}</span>
      <span class="ev-desc">${ev.desc}</span>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="ev-body" id="ev-${ev.action.replace(/\./g,'-')}-body">
      <p class="ev-desc-full">${ev.desc}</p>
      <div class="tbl-title">Payload</div>
      <pre><code>${escHtml(ev.payload)}</code></pre>
      ${causesHtml}
    </div>
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    { id: 'sec-users', label: T[lang].navUsers, data: eps.users },

    <div class="sec-title">${s.label}</div>
    ${s.data.map(ep => `<div id="${ep.id}">${renderEndpoint(ep, lang)}</div>`).join('')}
  </section>`).join('');

  // Webhooks section

      <div class="sec-title">${t.whTitle}</div>
      <p class="sec-desc">${t.whIntro}</p>
    </section>
    <section class="sec" id="wh-setup">
      <div class="sec-title">${t.whSetupTitle}</div>
      <p class="sec-desc">${t.whSetupDesc}</p>
      <div class="sub-title">${t.whValidTitle}</div>
      <p class="sec-desc">${t.whValidDesc}</p>
      <pre><code>GET https://yourserver.com/webhook?echo_string=abc123challenge

# Response (plain text):
abc123challenge</code></pre>
    </section>
    <section class="sec" id="wh-sig">
      <div class="sec-title">${t.whSigTitle}</div>
      <p class="sec-desc">${t.whSigDesc}</p>
      <pre><code>sign = "&lt;webhook_id&gt;-&lt;DO-Timestamp&gt;"
DO-Signature == HMAC-SHA256(signing_secret, sign)</code></pre>
      <div class="info-box">${t.whSigSecret}</div>
      <div class="sub-title">Python</div>
      <pre><code>import hmac, hashlib

def verify_signature(webhook_id, timestamp, signature, secret):
    sign = f"{webhook_id}-{timestamp}"
    expected = hmac.new(
        secret.encode(), sign.encode(), hashlib.sha256
    ).hexdigest()
    return hmac.compare_digest(expected, signature)</code></pre>
      <div class="sub-title">Node.js</div>
      <pre><code>const crypto = require('crypto');

function verifySignature(webhookId, timestamp, signature, secret) {
  const sign = \`\${webhookId}-\${timestamp}\`;
  const expected = crypto
    .createHmac('sha256', secret)
    .update(sign)
    .digest('hex');
  return crypto.timingSafeEqual(
    Buffer.from(expected), Buffer.from(signature)
  );
}</code></pre>

// ─── TOGGLE HELPERS ────────────────────────────────────────────────────────────
function toggleEp(hdr) {
  hdr.classList.toggle('open');
  const body = document.getElementById(hdr.id.replace('-hdr', '-body'));
  if (body) body.classList.toggle('open');
}
function toggleEv(hdr) {
  hdr.classList.toggle('open');
  const body = document.getElementById(hdr.id.replace('-hdr', '-body'));
  if (body) body.classList.toggle('open');
}

// ─── LANGUAGE SWITCH ───────────────────────────────────────────────────────────
let currentLang = 'en';
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === lang.toUpperCase());
  });
  document.getElementById('sidebar').innerHTML = renderSidebar(lang);
  document.getElementById('main').innerHTML = renderMain(lang);
  document.getElementById('footer-copy').textContent = T[lang].footerCopy;
  document.getElementById('footer-link').textContent = T[lang].footerLink;
  document.documentElement.lang = lang;
  // Update sidebar active on scroll
  setupScrollSpy();
}

// ─── SCROLL SPY ────────────────────────────────────────────────────────────────
function setupScrollSpy() {
  const links = document.querySelectorAll('.sb-link');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        links.forEach(l => {
          const href = l.getAttribute('href');
          l.classList.toggle('active', href === '#' + id);
        });
      }
    });
  }, { rootMargin: '-60px 0px -70% 0px' });

  document.querySelectorAll('.sec').forEach(sec => observer.observe(sec));
}

// ─── BACK TO TOP ───────────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const btt = document.getElementById('btt');
  btt.classList.toggle('show', window.scrollY > 400);
});

// ─── INIT ──────────────────────────────────────────────────────────────────────
setLang('en');
